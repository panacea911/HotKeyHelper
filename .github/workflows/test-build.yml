name: Test Autobuild

on:
  push:
    branches:
      - test
  pull_request:
    branches:
      - test

jobs:
  build:
    name: Build Test App
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish App
        run: dotnet publish -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o ./publish_output

      - name: Create Zip Archive
        run: Compress-Archive -Path ./publish_output/* -DestinationPath HotKeyHelper-win-x64-test.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HotKeyHelper-win-x64-test
          path: HotKeyHelper-win-x64-test.zip
